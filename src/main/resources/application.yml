spring:
  application:
    name: shop-back
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shop_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  threads:
    virtual:
      enabled: true

jwt:
  secret: ${JWT_SECRET:v6yB8N3p2m5L8k9J0h7G6f5D4s3A2q1W}
  access-token-expiration: 30000 # 30 seconds
  refresh-token-expiration: 604800000 # 7 days

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

shop:
  upload:
    path: uploads
